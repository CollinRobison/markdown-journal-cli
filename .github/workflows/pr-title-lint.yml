name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  semantic-pull-request:
    name: Semantic Pull Request
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            chore
            ci
          requireScope: false
          subjectPattern: ^\S.+$
          subjectPatternError: "PR title subject must not be empty. Use: <type>(optional-scope): <description>"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
