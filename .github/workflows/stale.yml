name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been marked stale due to 60 days of inactivity.
            It will be closed in 7 days if no further activity occurs.
          stale-pr-message: >
            This PR has been marked stale due to 60 days of inactivity.
            It will be closed in 7 days if no further activity occurs.
          days-before-stale: 60
          days-before-close: 7
