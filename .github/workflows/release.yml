name: Release

on:
  # Manual fallback only.
  # Primary release publishing runs in release-please.yml when release_created=true.
  # Use this workflow to backfill artifacts for an existing tag if needed.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v1.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --no-restore --configuration Release --verbosity minimal

  build-binaries:
    name: Build ${{ matrix.rid }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Set version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "value=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish markdown-journal-cli \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=true \
            -p:Version=${{ steps.version.outputs.value }} \
            -o ./publish/${{ matrix.rid }}

      - name: Zip ${{ matrix.rid }}
        run: |
          cd ./publish/${{ matrix.rid }}
          zip -r ../../mdjournal-${{ steps.version.outputs.value }}-${{ matrix.rid }}.zip .

      - name: Upload binary to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: mdjournal-${{ steps.version.outputs.value }}-${{ matrix.rid }}.zip

  pack-nuget:
    name: Pack & Upload NuGet
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Set version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag }}"
          echo "value=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Pack NuGet
        run: |
          dotnet pack markdown-journal-cli \
            -c Release \
            -p:Version=${{ steps.version.outputs.value }} \
            -o ./nupkg

      - name: Publish to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload NuGet package to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: ./nupkg/*.nupkg
