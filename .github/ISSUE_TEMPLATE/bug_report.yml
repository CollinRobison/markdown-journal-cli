name: Bug report
description: Report incorrect or unexpected behavior in markdown-journal-cli.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
        Please provide enough context to reproduce the issue reliably.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise summary of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands and inputs when possible.
      placeholder: |
        1. Run `mdjournal ...`
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Output / logs
      description: Paste relevant terminal output, stack traces, or screenshots.
      render: shell

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15, Ubuntu 24.04, Windows 11
    validations:
      required: true

  - type: input
    id: dotnet
    attributes:
      label: .NET SDK version
      placeholder: Output of `dotnet --version`
    validations:
      required: true

  - type: input
    id: mdjournal
    attributes:
      label: mdjournal version
      placeholder: Output of `mdjournal --version`
    validations:
      required: true
